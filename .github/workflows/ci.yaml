name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mise tools
        uses: jdx/mise-action@v2
        with:
          cache: true
          install: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: mise run check

      - name: Run tests
        run: mise run //apps/api:test
